# 포트폴리오 보고서 — 수동/비상 백업 (workflow_dispatch만, schedule 비활성)
# 일일 보고서는 Claude Code Routines(구독·무인)로 생성된다. 이 워크플로는 Routines 장애·
# 구독 만료 시 쓰는 Routines-독립 폴백(순수 GitHub Actions + Anthropic API 종량제).
#
# ─── 1회 설정 (정훈이 직접) ───────────────────────────────────────────────
# 1) 이 워크플로는 GitHub 규칙상 "기본 브랜치(main)"에 있어야 schedule이 작동한다.
#    → 이 브랜치를 main에 머지해야 매일 자동 실행됨.
# 2) GitHub 레포 > Settings > Secrets and variables > Actions 에 시크릿 추가:
#       ANTHROPIC_API_KEY = <Anthropic Console에서 발급한 API 키>
#    ⚠️ 주의: GitHub Actions 실행은 Claude 구독이 아니라 **Anthropic API(토큰 종량제)**를 쓴다.
#       Console(console.anthropic.com)에서 크레딧/결제 설정 필요.
# 3) (선택) 토스 실데이터까지 자동화하려면 TOSS_CLIENT_ID / TOSS_CLIENT_SECRET 시크릿 추가.
#    키 없으면 Yahoo 무키 시세로 보고서가 채워진다(시세·환율·지수는 완전).
# ──────────────────────────────────────────────────────────────────────────

name: Daily Portfolio Report

on:
  # ⛔ 자동 스케줄 비활성화 (2026-06-20): 일일 보고서는 Claude Code "Routines"(예약 작업,
  #    claude.ai/code/routines)로 전환 — 구독으로 충당, API 키 불필요, 폰 모니터링.
  #    이 워크플로는 백업/수동 실행용으로만 남김. 다시 켜려면 아래 schedule 주석 해제.
  # schedule:
  #   - cron: "20 8 * * 1-5"   # 08:20 UTC = 17:20 KST 평일
  workflow_dispatch: {}   # 수동 실행 버튼만 유지

permissions:
  contents: write          # 보고서 커밋·푸시용

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node (Claude Code + yt-dlp 서명 처리)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install -U yt-dlp
          npm install -g @anthropic-ai/claude-code

      - name: Generate report (headless Claude Code)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # 토스 키가 있으면 스킬이 환경변수로도 인식
          TOSS_CLIENT_ID: ${{ secrets.TOSS_CLIENT_ID }}
          TOSS_CLIENT_SECRET: ${{ secrets.TOSS_CLIENT_SECRET }}
        run: |
          claude -p "보고서" \
            --permission-mode acceptEdits \
            --allowedTools "Bash,Read,Write,Edit,WebSearch,WebFetch,Agent" \
            --max-turns 40

      - name: Rebuild app data (시세·손익·이슈 최신화)
        run: python3 .claude/skills/portfolio-desk/scripts/build_app_data.py || true

      - name: 일별 손익 스냅샷 (시계열)
        run: python3 .claude/skills/portfolio-desk/scripts/snapshot.py || true

      - name: 완료검증 게이트 (하네스 ② — 무인이라 FAIL이어도 커밋은 진행, 로그에 표기)
        run: |
          python3 .claude/skills/portfolio-desk/scripts/validate_report.py \
            || echo "⚠️ validate FAIL — 무인 백업이라 커밋은 진행. 로그 확인 후 다음 실행서 교정."

      - name: Commit & push report
        run: |
          git config user.name "portfolio-desk-bot"
          git config user.email "portfolio-desk-bot@users.noreply.github.com"
          git add docs/ data/app/ app/data.js data/snapshots/
          if git diff --staged --quiet; then
            echo "변경된 보고서 없음 — 커밋 생략"
          else
            git commit -m "자동 보고서 $(date -u +%Y-%m-%d) (GitHub Actions)"
            git push
          fi
