# 매일 17:20 KST 자동 포트폴리오 보고서 (완전 무인)
#
# ─── 1회 설정 (정훈이 직접) ───────────────────────────────────────────────
# 1) 이 워크플로는 GitHub 규칙상 "기본 브랜치(main)"에 있어야 schedule이 작동한다.
#    → 이 브랜치를 main에 머지해야 매일 자동 실행됨.
# 2) GitHub 레포 > Settings > Secrets and variables > Actions 에 시크릿 추가:
#       ANTHROPIC_API_KEY = <Anthropic Console에서 발급한 API 키>
#    ⚠️ 주의: GitHub Actions 실행은 Claude 구독이 아니라 **Anthropic API(토큰 종량제)**를 쓴다.
#       Console(console.anthropic.com)에서 크레딧/결제 설정 필요.
# 3) (선택) 토스 실데이터까지 자동화하려면 TOSS_CLIENT_ID / TOSS_CLIENT_SECRET 시크릿 추가.
#    키 없으면 Yahoo 무키 시세로 보고서가 채워진다(시세·환율·지수는 완전).
# ──────────────────────────────────────────────────────────────────────────

name: Daily Portfolio Report

on:
  schedule:
    # 08:20 UTC = 17:20 KST (KST는 서머타임 없음). 평일(월~금)만.
    - cron: "20 8 * * 1-5"
  workflow_dispatch: {}   # 수동 실행 버튼

permissions:
  contents: write          # 보고서 커밋·푸시용

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node (Claude Code + yt-dlp 서명 처리)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install -U yt-dlp
          npm install -g @anthropic-ai/claude-code

      - name: Generate report (headless Claude Code)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # 토스 키가 있으면 스킬이 환경변수로도 인식
          TOSS_CLIENT_ID: ${{ secrets.TOSS_CLIENT_ID }}
          TOSS_CLIENT_SECRET: ${{ secrets.TOSS_CLIENT_SECRET }}
        run: |
          claude -p "보고서" \
            --permission-mode acceptEdits \
            --allowedTools "Bash,Read,Write,Edit,WebSearch,WebFetch,Agent" \
            --max-turns 40

      - name: Commit & push report
        run: |
          git config user.name "portfolio-desk-bot"
          git config user.email "portfolio-desk-bot@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "변경된 보고서 없음 — 커밋 생략"
          else
            git commit -m "자동 보고서 $(date -u +%Y-%m-%d) (GitHub Actions)"
            git push
          fi
