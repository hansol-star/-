# 시세·손익·차트 무료 자동 갱신 (API 키 불필요)
#
# daily-report.yml(전자동 보고서)은 Anthropic API 키가 있어야 돌지만,
# 이 워크플로는 LLM을 안 쓰고 Yahoo 무키 시세만 긁어 app/data.js를 갱신한다.
# → 키를 안 넣어도 시세·평가손익·환율/코스피 차트·발동 트리거는 매일 자동 최신화.
#   (목표가·이슈·별점·경제사냥꾼 같은 '분석' 텍스트는 보고서를 돌릴 때만 바뀐다.)
#
# 비용 0 · 키 0. main에 push되어 있어야 schedule이 작동한다.

name: Refresh Prices (keyless)

on:
  schedule:
    - cron: "25 8 * * 1-5"    # 17:25 KST = KR 장 마감 후 (평일)
    - cron: "30 20 * * 1-5"   # 05:30 KST = US 장 마감 후 (평일)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-prices
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Rebuild app data (Yahoo 무키 시세)
        run: python3 .claude/skills/portfolio-desk/scripts/build_app_data.py

      - name: Commit & push if changed
        run: |
          git config user.name "portfolio-desk-bot"
          git config user.email "portfolio-desk-bot@users.noreply.github.com"
          git add app/data.js
          if git diff --staged --quiet; then
            echo "시세 변동 없음 — 커밋 생략"
          else
            git commit -m "시세 자동 갱신 $(date -u +%Y-%m-%dT%H:%MZ) (keyless)"
            git push
          fi
